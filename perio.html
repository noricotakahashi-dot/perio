<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ペリオチャート">
<title>歯周精密検査</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;background:#f5f5f0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;}
.papp{display:flex;flex-direction:column;height:100dvh;max-height:100dvh;background:#fff;overflow:hidden;position:relative;}
.phdr{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:0.5px solid #e0e0d8;background:#f9f9f6;flex-shrink:0;flex-wrap:wrap;}
.phtit{font-size:15px;font-weight:600;color:#1a1a1a;white-space:nowrap;}
.phi{padding:5px 10px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none;}
.pstats{font-size:12px;color:#888;white-space:nowrap;}
.pbtn{padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;border:0.5px solid;}
.pbtn-green{background:#EAF3DE;color:#2d6010;border-color:#C0DD97;}
.pbtn-blue{background:#E6F1FB;color:#185FA5;border-color:#B5D4F4;}
.pbtn-red{background:#fcebeb;color:#993556;border-color:#f4c0d1;}
.psavebadge{font-size:11px;color:#3B6D11;background:#EAF3DE;border-radius:6px;padding:2px 8px;white-space:nowrap;}
.ptabs{display:flex;border-bottom:0.5px solid #e0e0d8;flex-shrink:0;}
.ptab{flex:1;padding:7px;border:none;background:#f9f9f6;color:#888;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border-bottom:2.5px solid transparent;}
.ptab.active{color:#378ADD;border-bottom-color:#378ADD;background:#fff;font-weight:600;}
.ppbar{display:flex;align-items:center;gap:3px;padding:5px 12px;border-bottom:0.5px solid #e0e0d8;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ppbar::-webkit-scrollbar{display:none;}
.ppc{font-size:11px;padding:3px 8px;border-radius:12px;white-space:nowrap;border:0.5px solid #ddd;color:#888;cursor:pointer;flex-shrink:0;}
.ppc.active{background:#378ADD;color:#fff;border-color:#378ADD;font-weight:600;}
.ppc.done{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97;}
.ppar{font-size:11px;color:#ccc;flex-shrink:0;}
.ppdiv{width:1px;height:14px;background:#ddd;margin:0 5px;flex-shrink:0;}
.pchart{overflow-x:auto;overflow-y:hidden;flex-shrink:0;padding:3px 0;border-bottom:0.5px solid #e0e0d8;-webkit-overflow-scrolling:touch;}
.pchart::-webkit-scrollbar{height:3px;}
.pchart::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
.pci{display:inline-flex;flex-direction:column;gap:2px;padding:2px 12px;}
.prow{display:flex;align-items:center;}
.prlbl{width:42px;text-align:right;padding-right:6px;font-size:10px;color:#999;flex-shrink:0;line-height:1.3;}
.pteeth{display:flex;gap:3px;}
.ptcol{display:flex;gap:1px;}
.pmcell{width:20px;height:24px;display:flex;align-items:center;justify-content:center;border:0.5px solid #e0e0d8;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;position:relative;color:#aaa;user-select:none;-webkit-user-select:none;background:#fff;}
.pmcell.sel{border:2.5px solid #378ADD!important;background:#EBF4FF;color:#185FA5!important;}
.pmcell.v1{color:#0F6E56;background:#f0faf6;}
.pmcell.v2{color:#BA7517;background:#fdf8ee;}
.pmcell.v3{color:#D0302F;background:#fff2f2;}
.pmcell.bop-on{color:#D0302F!important;background:#FCEBEB!important;border-color:#f4c0d1!important;}
.psup{width:5px;height:5px;border-radius:50%;background:#EF9F27;position:absolute;top:1px;left:1px;}
.ptooth{width:62px;height:34px;display:flex;align-items:center;justify-content:center;border:0.5px solid #ccc;border-radius:6px;font-size:17px;font-weight:600;color:#999;cursor:pointer;user-select:none;-webkit-user-select:none;background:#fafafa;}
.ptooth.tact{background:#EBF4FF;border-color:#378ADD;color:#185FA5;}
.ptooth.tmt{opacity:0.22;background:#f0f0f0;text-decoration:line-through;}
.pmob{width:62px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;border-radius:4px;user-select:none;-webkit-user-select:none;}
.pmob.m0{color:#ddd;}.pmob.m1{background:#fdf8ee;color:#BA7517;}.pmob.m2{background:#fff2f2;color:#D07030;}.pmob.m3{background:#FCEBEB;color:#D0302F;}
.pmid{width:2px;background:#B5D4F4;border-radius:1px;align-self:stretch;}
.pgap{display:flex;align-items:center;padding:2px 0 2px 42px;gap:6px;}
.pgap-l{height:0.5px;background:#e0e0d8;flex:1;}
.pgap-t{font-size:10px;color:#bbb;white-space:nowrap;}
.pqlbl{font-size:12px;font-weight:600;color:#378ADD;text-align:center;padding:3px 0;}
.pleg{display:flex;align-items:center;gap:8px;padding:3px 0 3px 42px;font-size:10px;color:#999;flex-wrap:wrap;}
.pleg-dot{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;margin-right:3px;}
.pinput{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.psinf{padding:6px 14px;border-bottom:0.5px solid #e0e0d8;font-size:13px;display:flex;align-items:center;gap:8px;flex-shrink:0;background:#f9f9f6;min-height:36px;flex-wrap:wrap;}
.pbdg{background:#378ADD;color:#fff;border-radius:6px;padding:2px 9px;font-size:12px;font-weight:600;}
.pbdg2{border-radius:6px;padding:2px 7px;font-size:12px;}
.pnp{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(6,1fr);gap:6px;padding:10px;min-height:0;}
.pnb{border:0.5px solid #ddd;border-radius:12px;background:#fff;color:#1a1a1a;font-size:28px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:inherit;user-select:none;-webkit-user-select:none;-webkit-appearance:none;}
.pnb:active{background:#f0f0f0;transform:scale(0.94);}
.pnb.bop{background:#FCEBEB;color:#993556;border-color:#f4c0d1;font-size:13px;font-weight:600;line-height:1.5;text-align:center;}
.pnb.bop.on{background:#E24B4A;color:#fff;border-color:#E24B4A;}
.pnb.sup{background:#FAEEDA;color:#854F0B;border-color:#FAC775;font-size:13px;font-weight:600;line-height:1.5;text-align:center;}
.pnb.sup.on{background:#EF9F27;color:#fff;border-color:#EF9F27;}
.pnb.mt{background:#f0f0f0;color:#777;font-size:13px;font-weight:600;line-height:1.5;text-align:center;}
.pnb.mt.on{background:#5F5E5A;color:#fff;}
.pnb.del{background:#f5f5f2;font-size:24px;color:#666;}
.pnb.nav{background:#f5f5f2;font-size:14px;color:#666;line-height:1.5;text-align:center;}
.pnb.fill3{grid-column:span 3;background:#EAF3DE;color:#2d6010;border-color:#C0DD97;font-size:15px;font-weight:700;border-radius:12px;}
.pnb.fill3:active{background:#C0DD97;}
/* PCR panel */
.pcr-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.pcr-statsbar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:0.5px solid #e0e0d8;flex-shrink:0;background:#f9f9f6;}
.pcr-pct{font-size:26px;font-weight:700;color:#D0302F;line-height:1;}
.pcr-fraction{font-size:13px;color:#888;}
.pcr-scroll{overflow-x:auto;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding:10px 12px;}
.pcr-scroll::-webkit-scrollbar{height:3px
